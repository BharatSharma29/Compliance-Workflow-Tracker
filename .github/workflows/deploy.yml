name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # =========================
      # Backend
      # =========================
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Run ESLint (Backend)
        run: |
          cd backend
          npx eslint . || true

      - name: Run Security Audit
        run: |
          cd backend
          npm audit --audit-level=moderate || true

      # =========================
      # Frontend
      # =========================
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend
        run: |
          cd frontend
          npm run build